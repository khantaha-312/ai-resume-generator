<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Template Selection</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }
        .cv-template {
            border: 2px solid #333;
            padding: 20px;
            text-align: center;
            width: 30%;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .cv-template img {
            max-width: 100%;
            height: auto;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }
        .cv-template:hover {
            transform: scale(1.05);
        }
        .cv-template-title {
            font-size: 18px;
            font-weight: bold;
        }
        .title {
            color: lightblue;
            text-align: center;

        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Choose Your CV Template</h1>

    <div class="container">
        <!-- Template 1 -->
        <div class="cv-template" onclick="window.location.href='{% url 'template1' %}'">
            <img src="{% static 'images/template1.png' %}" alt="Template 1">
            <p class="cv-template-title">CV Template 1</p>
        </div>

        <!-- Template 2 -->
        <div class="cv-template" onclick="window.location.href='{% url 'template2' %}'">
            <img src="{% static 'images/template2.png' %}" alt="Template 2">
            <p class="cv-template-title">CV Template 2</p>
        </div>

        <!-- Template 3 -->
        <div class="cv-template" onclick="window.location.href='{% url 'template3' %}'">
            <img src="{% static 'images/template3.png' %}" alt="Template 3">
            <p class="cv-template-title">CV Template 3</p>
        </div>
    </div>

</body>
</html>
